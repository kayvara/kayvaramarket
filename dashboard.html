<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

<h1>Marketplace Indonesia</h1>

<button onclick="logout()">
Logout
</button>

</header>

<section class="profile">

<h2>👤 Informasi Akun</h2>

<p id="username"></p>
<p id="email"></p>

</section>

<section class="wallet">

<h2>💰 Dompet</h2>

<h3>Rp 0</h3>

</section>

<section class="categories">

<div class="box">
<img src="assets/parfum.jpg">
<h3>Parfum</h3>
</div>

<div class="box">
<img src="assets/fashion.jpg">
<h3>Fashion</h3>
</div>

<div class="box">
<img src="assets/pulsa.jpg">
<h3>Pulsa</h3>
</div>

<div class="box">
<img src="assets/pln.jpg">
<h3>Token PLN</h3>
</div>

<div class="box">
<img src="assets/game.jpg">
<h3>Top Up Game</h3>
</div>

</section>

<script src="js/dashboard.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzn0336rRIiKHnt--XjkA_TmvesjnkKz4",
  authDomain: "kayvara-market-f9615.firebaseapp.com",
  projectId: "kayvara-market-f9615",
  storageBucket: "kayvara-market-f9615.firebasestorage.app",
  messagingSenderId: "983801971030",
  appId: "1:983801971030:web:70fee1d37319fa492cd6f7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// kalau belum login, lempar ke login page
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById("email").innerText = user.email;
    document.getElementById("username").innerText = user.email.split("@")[0];
  }
});

// logout
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>
</body>
</html>
