<!-- 🛒 PRODUK DARI FIREBASE -->
<section style="padding:20px;">
<h2>🛍️ Produk Tersedia</h2>
<div id="productList" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:15px;"></div>
</section>

<script src="js/dashboard.js"></script>

<!-- 🔥 FIREBASE FULL SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzn0336rRIiKHnt--XjkA_TmvesjnkKz4",
  authDomain: "kayvara-market-f9615.firebaseapp.com",
  projectId: "kayvara-market-f9615",
  storageBucket: "kayvara-market-f9615.firebasestorage.app",
  messagingSenderId: "983801971030",
  appId: "1:983801971030:web:70fee1d37319fa492cd6f7"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

// 🔒 CEK LOGIN
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById("email").innerText = user.email;
    document.getElementById("username").innerText = user.email.split("@")[0];
  }
});

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};


// 🛒 AMBIL PRODUK DARI FIRESTORE
const productList = document.getElementById("productList");

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const card = `
      <div style="background:white;padding:10px;border-radius:10px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.1);">
        <img src="${data.image}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;">
        <h3 style="font-size:14px;margin:10px 0;">${data.name}</h3>
        <p style="color:#2563eb;font-weight:bold;">Rp ${data.price}</p>

        <button style="margin-top:10px;padding:8px;width:100%;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer;">
          Beli
        </button>
      </div>
    `;

    productList.innerHTML += card;
  });
}

loadProducts();

</script>

</body>
