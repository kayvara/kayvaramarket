<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - KAYVARA VEAT</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e3a8a,
    #2563eb
    );
    padding:20px;
}

.login-container{
    width:100%;
    max-width:450px;
}

.login-card{
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:
    0 20px 50px rgba(0,0,0,.25);
}

.logo{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#64748b;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    font-size:15px;
    transition:.3s;
}

.input-group input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.1);
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.options a{
    text-decoration:none;
    color:#2563eb;
    font-size:14px;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.divider{
    text-align:center;
    margin:25px 0;
    color:#94a3b8;
}

.register-link{
    text-align:center;
    color:#64748b;
}

.register-link a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}

.security-box{
    margin-top:20px;
    background:#eff6ff;
    border-radius:12px;
    padding:12px;
    text-align:center;
    font-size:13px;
    color:#1e40af;
}

</style>
</head>
<body>

<div class="login-container">

<div class="login-card">

<div class="logo">
🛒 KAYVARA VEAT
</div>

<p class="subtitle">
Masuk ke akun marketplace Anda
</p>

<form id="loginForm">

<div class="input-group">
<label>Email atau Username</label>
<input
type="text"
id="username"
placeholder="Masukkan Email atau Username"
required>
</div>

<div class="input-group">
<label>Kata Sandi</label>
<input
type="password"
id="password"
placeholder="Masukkan Kata Sandi"
required>
</div>

<div class="options">

<label>
<input type="checkbox">
 Ingat Saya
</label>

<a href="forgot-password.html">
Lupa Kata Sandi?
</a>

</div>

<button
type="submit"
class="login-btn">
LOGIN
</button>

</form>

<div class="divider">
──────── atau ────────
</div>

<div class="register-link">
Belum punya akun?
<a href="register.html">
Daftar Sekarang
</a>
</div>

<div class="security-box">
🔒 Sistem keamanan berlapis dan verifikasi akun aktif.
</div>

</div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

if(username === ""){
    alert("Masukkan username atau email");
    return;
}

if(password === ""){
    alert("Masukkan kata sandi");
    return;
}

/*
Nanti bagian ini diganti Firebase Login
*/

alert("Login berhasil!");

window.location.href =
"dashboard.html";

});

</script>

</body>
</html>
