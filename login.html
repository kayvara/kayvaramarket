<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - KAYVARA VEAT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    padding:20px;
}

.login-container{
    width:100%;
    max-width:450px;
}

.login-card{
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#64748b;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    font-size:15px;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn:hover{
    background:#1d4ed8;
}

.register-link{
    text-align:center;
    margin-top:20px;
    color:#64748b;
}

.register-link a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="login-container">
<div class="login-card">

<div class="logo">🛒 KAYVARA VEAT</div>
<p class="subtitle">Masuk ke akun marketplace Anda</p>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit" class="login-btn">
LOGIN
</button>

</form>

<div class="register-link">
Belum punya akun?
<a href="register.html">Daftar Sekarang</a>
</div>

</div>
</div>

<!-- 🔥 FIREBASE LOGIN (FIXED) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzn0336rRIiKHnt--XjkA_TmvesjnkKz4",
  authDomain: "kayvara-market-f9615.firebaseapp.com",
  projectId: "kayvara-market-f9615",
  storageBucket: "kayvara-market-f9615.firebasestorage.app",
  messagingSenderId: "983801971030",
  appId: "1:983801971030:web:70fee1d37319fa492cd6f7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);

        alert("Login berhasil!");
        window.location.href = "dashboard.html";

    } catch (error) {
        alert("Login gagal: " + error.message);
    }
});
</script>

</body>
</html>
