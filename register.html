<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Daftar Akun</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="card">

<h2>Daftar Akun</h2>

<input type="text" id="username" placeholder="Nama Pengguna">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Kata Sandi">

<input type="password" id="confirmPassword" placeholder="Konfirmasi Kata Sandi">

<input type="text" id="pin" maxlength="6" placeholder="PIN Keamanan 6 Digit">

<label class="agree-box">
    <input type="checkbox" id="agree">
    Saya telah membaca, memahami, dan menyetujui
    Syarat & Ketentuan serta Kebijakan Privasi.
</label>

<button id="registerBtn" disabled>
    DAFTAR SEKARANG
</button>

<a href="login.html">Sudah punya akun?</a>

</div>

<script src="js/register.js"></script>

</body>
</html>
